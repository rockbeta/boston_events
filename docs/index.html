<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Free Events in Greater Boston</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="">
<script defer src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>

<style>
  :root {
    --bg: #fafaf7;
    --card: #ffffff;
    --ink: #1c1c1c;
    --muted: #666;
    --accent: #b32525;
    --border: #e3e3df;
    --chip: #f1efe8;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #161616;
      --card: #1f1f1f;
      --ink: #f1f1ee;
      --muted: #a4a4a0;
      --accent: #ff7676;
      --border: #2c2c2c;
      --chip: #2a2a2a;
    }
  }
  * { box-sizing: border-box; }
  body {
    font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--ink);
    margin: 0;
    padding: 0 24px 60px;
    max-width: 1200px;
    margin: 0 auto;
  }
  header { padding: 36px 0 12px; border-bottom: 1px solid var(--border); }
  h1 { margin: 0 0 4px; font-size: 28px; letter-spacing: -0.02em; }
  .subtitle { color: var(--muted); margin: 0 0 16px; }

  /* Map */
  #map {
    height: 380px; width: 100%;
    border: 1px solid var(--border); border-radius: 12px;
    margin: 16px 0 4px;
    z-index: 1;                  /* sits below the sticky filter bar */
  }
  @media (max-width: 700px) { #map { height: 280px; } }
  .map-meta {
    color: var(--muted); font-size: 13px; margin-bottom: 8px;
  }
  /* Leaflet popup tweaks */
  .leaflet-popup-content { font-size: 13px; line-height: 1.4; margin: 10px 12px; }
  .leaflet-popup-content strong { display: block; margin-bottom: 2px; }
  .leaflet-popup-content a { color: var(--accent); }

  .controls {
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
    padding: 16px 0; position: sticky; top: 0; background: var(--bg);
    z-index: 5; border-bottom: 1px solid var(--border);
  }
  input[type=search], select {
    padding: 8px 12px; font-size: 15px; border: 1px solid var(--border);
    background: var(--card); color: var(--ink); border-radius: 8px;
  }
  input[type=search] { flex: 1 1 240px; min-width: 220px; }
  .stats { color: var(--muted); font-size: 14px; margin-left: auto; }
  main {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 16px; padding-top: 20px;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px;
    display: flex; flex-direction: column; gap: 10px;
    transition: transform .12s ease, box-shadow .12s ease, outline-color .25s ease;
    outline: 2px solid transparent; outline-offset: 2px;
    scroll-margin-top: 80px;     /* keep card visible below sticky filters */
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,.06); }
  .card.flash { outline-color: var(--accent); }
  .card h3 { margin: 0; font-size: 17px; line-height: 1.3; }
  .card h3 a { color: var(--ink); text-decoration: none; }
  .card h3 a:hover { color: var(--accent); }
  .meta { font-size: 13px; color: var(--muted); }
  .meta strong { color: var(--ink); font-weight: 500; }
  .desc { font-size: 14px; line-height: 1.45; color: var(--ink); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: auto; }
  .chip {
    background: var(--chip); padding: 3px 10px; border-radius: 999px;
    font-size: 12px; color: var(--muted);
  }
  .chip.audience { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
  .empty { color: var(--muted); padding: 60px 0; text-align: center; }
  footer { padding: 30px 0; color: var(--muted); font-size: 13px; text-align: center; }
  footer a { color: var(--muted); }
</style>
</head>
<body>
<header>
  <h1>Free Events in Greater Boston</h1>
  <p class="subtitle">Aggregated from MIT, BU, Harvard, Mass.gov, Boston.gov, Eventbrite. Updated whenever the script runs.</p>
</header>

<div id="map"></div>
<div class="map-meta" id="mapMeta">Loading map…</div>

<div class="controls">
  <input id="q" type="search" placeholder="Search events, venues, topics…">
  <select id="audience"><option value="">All audiences</option></select>
  <select id="source"><option value="">All sources</option></select>
  <select id="when">
    <option value="">Anytime in window</option>
    <option value="today">Today</option>
    <option value="weekend">This weekend</option>
    <option value="week">Next 7 days</option>
  </select>
  <span class="stats" id="stats">Loading…</span>
</div>

<main id="grid"></main>

<footer>
  <span id="updated">Loading data…</span> ·
  <a href="https://github.com/rockbeta/boston_events" target="_blank" rel="noopener">source on GitHub</a> ·
  Map © <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> contributors
</footer>

<script>
const fmt = new Intl.DateTimeFormat("en-US", {
  weekday: "short", month: "short", day: "numeric",
  hour: "numeric", minute: "2-digit",
});

function uniq(arr) { return [...new Set(arr.filter(Boolean))].sort(); }

function isThisWeekend(date) {
  const d = date.getDay();
  const now = new Date();
  const diffDays = Math.floor((date - now) / 86400000);
  return diffDays >= 0 && diffDays < 8 && (d === 5 || d === 6 || d === 0);
}
function isToday(date) {
  const n = new Date();
  return date.toDateString() === n.toDateString();
}
function isWithin7(date) {
  const n = new Date();
  return date - n >= -86400000 && date - n < 7 * 86400000;
}

let allEvents = [];
let map = null;
let markerLayer = null;
let markersById = {};

function initMap() {
  if (typeof L === "undefined") return;             // Leaflet not loaded yet
  if (map) return;
  map = L.map("map", { scrollWheelZoom: false }).setView([42.3601, -71.0589], 12);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    maxZoom: 19,
    attribution: "&copy; OpenStreetMap contributors",
  }).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
}

function flashCard(id) {
  const card = document.querySelector(`[data-event-id="${id}"]`);
  if (!card) return;
  card.scrollIntoView({ behavior: "smooth", block: "center" });
  card.classList.add("flash");
  setTimeout(() => card.classList.remove("flash"), 1600);
}

function renderMarkers(filtered) {
  if (!map || !markerLayer) return;
  markerLayer.clearLayers();
  markersById = {};
  const points = [];
  for (const e of filtered) {
    if (typeof e.lat !== "number" || typeof e.lon !== "number") continue;
    const m = L.marker([e.lat, e.lon]);
    const d = new Date(e.start);
    const when = isNaN(d) ? e.start : fmt.format(d);
    m.bindPopup(
      `<strong>${escapeHtml(e.name)}</strong>` +
      `<div>${escapeHtml(when)}</div>` +
      `<div>${escapeHtml(e.location)}</div>` +
      `<a href="${e.url}" target="_blank" rel="noopener">Source ↗</a>`
    );
    m.on("click", () => flashCard(e.id));
    m.addTo(markerLayer);
    markersById[e.id] = m;
    points.push([e.lat, e.lon]);
  }
  const meta = document.getElementById("mapMeta");
  if (points.length) {
    map.fitBounds(points, { padding: [30, 30], maxZoom: 14 });
    meta.textContent = `${points.length} of ${filtered.length} event${filtered.length === 1 ? "" : "s"} placed on the map`;
  } else {
    meta.textContent = "No mappable events match the current filters.";
  }
}

function render() {
  const q = document.getElementById("q").value.trim().toLowerCase();
  const aud = document.getElementById("audience").value;
  const src = document.getElementById("source").value;
  const when = document.getElementById("when").value;

  const filtered = allEvents.filter(e => {
    if (aud && e.audience !== aud) return false;
    if (src && e.source !== src) return false;
    if (when) {
      const d = new Date(e.start);
      if (when === "today" && !isToday(d)) return false;
      if (when === "weekend" && !isThisWeekend(d)) return false;
      if (when === "week" && !isWithin7(d)) return false;
    }
    if (q) {
      const blob = (e.name + " " + e.location + " " + e.description + " " + e.audience).toLowerCase();
      if (!blob.includes(q)) return false;
    }
    return true;
  });

  document.getElementById("stats").textContent =
    `${filtered.length} of ${allEvents.length} event${allEvents.length === 1 ? "" : "s"}`;

  const grid = document.getElementById("grid");
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty">No events match those filters.</div>`;
  } else {
    grid.innerHTML = filtered.map(e => {
      const d = new Date(e.start);
      const when = isNaN(d) ? e.start : fmt.format(d);
      return `
        <article class="card" data-event-id="${escapeHtml(e.id)}">
          <div class="meta">${when}</div>
          <h3><a href="${e.url}" target="_blank" rel="noopener">${escapeHtml(e.name)}</a></h3>
          <div class="meta">📍 ${escapeHtml(e.location)}</div>
          <div class="desc">${escapeHtml(e.description || "")}</div>
          <div class="chips">
            <span class="chip audience">${escapeHtml(e.audience || "All ages")}</span>
            <span class="chip">${escapeHtml(e.source)}</span>
          </div>
        </article>`;
    }).join("");
  }

  renderMarkers(filtered);
}

function escapeHtml(s) {
  return (s == null ? "" : String(s)).replace(/[&<>"']/g, c => ({
    "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;",
  }[c]));
}

function populateSelect(id, values) {
  const sel = document.getElementById(id);
  for (const v of values) {
    const opt = document.createElement("option");
    opt.value = v; opt.textContent = v;
    sel.appendChild(opt);
  }
}

async function load() {
  try {
    const r = await fetch("events.json", { cache: "no-cache" });
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    allEvents = data.events || [];
    populateSelect("audience", uniq(allEvents.map(e => e.audience)));
    populateSelect("source",   uniq(allEvents.map(e => e.source)));
    document.getElementById("updated").textContent =
      "Last updated " + new Date(data.generated_at).toLocaleString();
    render();
  } catch (e) {
    document.getElementById("grid").innerHTML =
      `<div class="empty">Couldn't load events.json: ${e.message}.<br>
       Run <code>python update_events.py</code> to generate it.</div>`;
    document.getElementById("stats").textContent = "";
    document.getElementById("updated").textContent = "";
    document.getElementById("mapMeta").textContent = "";
  }
}

["q", "audience", "source", "when"].forEach(id =>
  document.getElementById(id).addEventListener("input", render)
);

// Leaflet loads with `defer`; bring up the map once the page is ready.
window.addEventListener("DOMContentLoaded", () => {
  // If Leaflet hasn't downloaded yet, wait for its `load` event.
  const start = () => { initMap(); load(); };
  if (typeof L !== "undefined") start();
  else window.addEventListener("load", start, { once: true });
});
</script>
</body>
</html>
